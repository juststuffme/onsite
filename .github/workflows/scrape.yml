name: Scrape Onsite Manager Listings

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2am UTC (12pm AEST)
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated listings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.json
          git diff --staged --quiet || git commit -m "Auto-update listings.json [$(date '+%Y-%m-%d')]"
          git push
